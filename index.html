<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>我的 ETF 顾问</title>
  <style>
    /* ─── 基础重置 ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --bg-card:   #161b22;
      --border:    #21262d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #ffa657;
      --blue:      #58a6ff;
      --lime:      #a3e635;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ─── 头部 ─── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; }
    .header-left .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .refresh-btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-btn:active { background: #0d1117; }

    /* ─── 总览卡片 ─── */
    .summary-card {
      margin: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .summary-total { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .summary-row {
      display: flex;
      gap: 0;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .summary-cell { flex: 1; }
    .summary-cell + .summary-cell { border-left: 1px solid var(--border); padding-left: 16px; }
    .cell-label { font-size: 11px; color: var(--muted); }
    .cell-value { font-size: 16px; font-weight: 700; margin-top: 3px; }
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      margin-top: 12px;
      color: var(--muted);
    }
    .market-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .market-dot.open { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ─── 区域标题 ─── */
    .section-title {
      padding: 6px 16px 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ─── ETF 卡片 ─── */
    .etf-card {
      margin: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* 顶部操作建议条 */
    .card-signal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .signal-action {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .signal-reason {
      font-size: 12px;
      opacity: 0.85;
      text-align: right;
      max-width: 55%;
      line-height: 1.4;
    }
    .bar-sell       { background: rgba(248,81,73,0.18);  color: var(--red);    }
    .bar-sell-light { background: rgba(255,166,87,0.18); color: var(--yellow); }
    .bar-hold       { background: rgba(63,185,80,0.18);  color: var(--green);  }
    .bar-watch      { background: rgba(88,166,255,0.18); color: var(--blue);   }
    .bar-buy        { background: rgba(163,230,53,0.18); color: var(--lime);   }

    /* 卡片主体 */
    .card-body { padding: 14px 16px 16px; }
    .card-name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .etf-name { font-size: 16px; font-weight: 700; }
    .etf-meta { font-size: 11px; color: var(--muted); }

    /* 价格行 */
    .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .price-main { font-size: 28px; font-weight: 800; }
    .price-today { font-size: 13px; font-weight: 600; }

    /* 数据网格 */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .grid-label { font-size: 10px; color: var(--muted); }
    .grid-value { font-size: 13px; font-weight: 600; margin-top: 2px; }

    /* 信号徽章（保留用于summary） */
    .badge {
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-sell       { background: rgba(248,81,73,0.15);  color: var(--red);    }
    .badge-sell-light { background: rgba(255,166,87,0.15); color: var(--yellow); }
    .badge-hold       { background: rgba(63,185,80,0.15);  color: var(--green);  }
    .badge-watch      { background: rgba(88,166,255,0.15); color: var(--blue);   }
    .badge-buy        { background: rgba(163,230,53,0.15); color: var(--lime);   }

    /* ─── 颜色工具 ─── */
    .pos { color: var(--green); }
    .neg { color: var(--red);   }
    .neu { color: var(--muted); }

    /* ─── 规则卡片 ─── */
    .rules-card {
      margin: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }
    .rules-card h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .rule-row {
      padding: 9px 0;
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
    }
    .rule-row:last-child { border-bottom: none; padding-bottom: 0; }

    /* ─── 观察列表 ─── */
    .watchlist-card {
      margin: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }
    .watchlist-empty {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 10px 0;
    }

    /* ─── 底部时间 ─── */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
    }

    /* ─── 加载状态 ─── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loading { animation: pulse 1.5s infinite; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">

  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <h1>我的 ETF 顾问</h1>
      <div class="subtitle" id="updateTime">加载中...</div>
    </div>
    <button class="refresh-btn" onclick="loadPrices()">↻ 刷新</button>
  </div>

  <!-- 总览 -->
  <div id="summaryArea" class="summary-card">
    <div class="summary-label">总资产</div>
    <div class="summary-total loading">计算中...</div>
  </div>

  <!-- 持仓 -->
  <div class="section-title">持仓分析</div>
  <div id="etfArea"></div>

  <!-- 观察列表 -->
  <div class="section-title">观察列表（暂时为空，后续可添加）</div>
  <div class="watchlist-card">
    <div class="watchlist-empty">暂无观察对象 — 你可以让我帮你加入想关注的 ETF</div>
  </div>

  <!-- 操作规则 -->
  <div class="section-title">我的操作规则</div>
  <div class="rules-card">
    <div class="rule-row">🚫 <strong>不追高</strong> — 某只涨幅超过 15%，先别加仓，等等看</div>
    <div class="rule-row">💰 <strong>分批止盈</strong> — 浮盈超 15%，先卖出 10-20%，不贪</div>
    <div class="rule-row">📉 <strong>分批加仓</strong> — 跌回成本价附近，可以小额补仓</div>
    <div class="rule-row">⏸️ <strong>默认不动</strong> — 不确定该怎么做？什么都不做就对了</div>
    <div class="rule-row">🔄 <strong>分批原则</strong> — 买卖都要分批，永远不一次全买全卖</div>
  </div>

  <div class="footer" id="footer"></div>

</div>

<script>
// ════════════════════════════════════════════════════════════
// 📋 你的持仓配置
// 想改成本价、份数，或者加新 ETF，改这里就行
// ════════════════════════════════════════════════════════════
const HOLDINGS = [
  {
    code: 'sz159869',
    name: '游戏ETF',
    shares: 55000,
    costPrice: 1.198,
    type: 'thematic',
    desc: '游戏行业 · 弹性大波动大',
    stopProfitAt: 0.15,
    addPositionAt: -0.05,
  },
  {
    code: 'sz161125',
    name: '标普500LOF',
    shares: 33100,
    costPrice: 2.795,
    type: 'config',
    desc: '美国大市场 · 相对稳定',
    stopProfitAt: 0.20,
    addPositionAt: -0.08,
  },
  {
    code: 'sz159583',
    name: '通信设备ETF',
    shares: 90600,
    costPrice: 1.267,
    type: 'aggressive',
    desc: '中国科技制造 · 进攻型',
    stopProfitAt: 0.15,
    addPositionAt: -0.05,
  },
];

// ════════════════════════════════════════════════════════════
// 🧠 操作建议逻辑（这就是"顾问"的大脑）
// 根据浮盈/浮亏百分比，给出操作建议
// ════════════════════════════════════════════════════════════
function getSignal(pnlPct, etf) {
  const p = pnlPct;

  if (p >= etf.stopProfitAt + 0.05) {
    return {
      label: '分批止盈',
      css: 'badge-sell',
      shortReason: `涨了 ${pct(p)}，先卖出 15-20%`,
      advice: `浮盈已达 ${pct(p)}，涨幅较大。建议先卖出 15-20% 锁定利润，剩余继续拿着。`,
    };
  }
  if (p >= etf.stopProfitAt) {
    return {
      label: '小额止盈',
      css: 'badge-sell-light',
      shortReason: `浮盈 ${pct(p)}，可先卖 5-10%`,
      advice: `浮盈接近 ${pct(etf.stopProfitAt)}，可以考虑先卖出 5-10% 的仓位，其余继续持有。`,
    };
  }
  if (p >= 0.03) {
    return {
      label: '继续持有',
      css: 'badge-hold',
      shortReason: `浮盈 ${pct(p)}，不用动`,
      advice: `浮盈 ${pct(p)}，状态正常。继续持有，不用动。`,
    };
  }
  if (p >= etf.addPositionAt) {
    return {
      label: '观察',
      css: 'badge-watch',
      shortReason: '接近成本价，先等等',
      advice: `接近成本价（${pct(p)}），方向不明确。先观察，不确定就先不动。`,
    };
  }
  return {
    label: '可小额加仓',
    css: 'badge-buy',
    shortReason: `跌破成本 ${pct(Math.abs(p))}，可小额补仓`,
    advice: `跌至成本价以下 ${pct(Math.abs(p))}，如果你对这个方向还有信心，可以小额加仓（不超过原仓位的 20%）。`,
  };
}

// ════════════════════════════════════════════════════════════
// 🔄 获取实时价格
// 优先级：① Vercel 后端 → ② CORS 代理（备用）→ ③ 上次已知价格
// ════════════════════════════════════════════════════════════

// 你上次告诉我的价格（兜底值，确保页面永远有内容显示）
const LAST_KNOWN = {
  'sz159869': { current: 1.344, prevClose: 1.325 },
  'sz161125': { current: 2.833, prevClose: 2.810 },
  'sz159583': { current: 1.357, prevClose: 1.340 },
};

async function loadPrices() {
  // 先渲染已知价格，页面立刻可见
  render(LAST_KNOWN);
  setStatus('获取最新数据中...');

  try {
    // 读取 GitHub Actions 自动更新的 prices.json
    const res = await fetch('prices.json?t=' + Date.now());
    if (res.ok) {
      const json = await res.json();
      if (json.success && json.data) {
        render(json.data);
        setStatus('数据更新于 ' + json.updatedAt);
        return;
      }
    }
  } catch (_) {}

  // 兜底：使用上次已知价格
  setStatus('⚠️ 使用上次已知价格');
}

function setStatus(msg) {
  document.getElementById('updateTime').textContent = msg;
}

// ════════════════════════════════════════════════════════════
// 🎨 渲染页面
// ════════════════════════════════════════════════════════════
function render(prices) {
  let totalCost = 0, totalValue = 0;
  const cards = [];

  HOLDINGS.forEach(etf => {
    const p = prices[etf.code] || LAST_KNOWN[etf.code];
    const cur = p.current;
    const prev = p.prevClose;

    const cost  = etf.shares * etf.costPrice;
    const value = etf.shares * cur;
    const pnl   = value - cost;
    const pnlPct = pnl / cost;
    const todayChg = (cur - prev) / prev;

    totalCost  += cost;
    totalValue += value;

    const sig = getSignal(pnlPct, etf);

    // 今日盈亏金额
    const todayPnl = etf.shares * (cur - prev);

    cards.push(`
      <div class="etf-card">

        <!-- 顶部：操作建议（最显眼） -->
        <div class="card-signal-bar bar-${sig.css.replace('badge-','')}">
          <div class="signal-action">${sig.label}</div>
          <div class="signal-reason">${sig.shortReason}</div>
        </div>

        <div class="card-body">
          <!-- ETF 名称 -->
          <div class="card-name-row">
            <span class="etf-name">${etf.name}</span>
            <span class="etf-meta">${etf.desc}</span>
          </div>

          <!-- 现价 + 今日涨跌 -->
          <div class="price-row">
            <span class="price-main"">¥${cur.toFixed(3)}</span>
            <span class="price-today ${color(todayChg)}">
              ${todayChg >= 0 ? '▲' : '▼'} ${pct(Math.abs(todayChg))} 今日
            </span>
            <span class="price-today ${color(todayPnl)}" style="margin-left:4px">
              ${money(todayPnl)}
            </span>
          </div>

          <!-- 三格数据 -->
          <div class="card-grid">
            <div>
              <div class="grid-label">持有市值</div>
              <div class="grid-value">¥${Math.round(value).toLocaleString()}</div>
            </div>
            <div>
              <div class="grid-label">总浮盈</div>
              <div class="grid-value ${color(pnlPct)}">${sign(pnlPct)}${pct(Math.abs(pnlPct))}</div>
            </div>
            <div>
              <div class="grid-label">成本 → 现价</div>
              <div class="grid-value">¥${etf.costPrice.toFixed(3)} → ${cur.toFixed(3)}</div>
            </div>
          </div>
        </div>

      </div>
    `);
  });

  // 总览
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalPnl / totalCost;
  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-label">总资产</div>
    <div class="summary-total ${color(totalPnlPct)}">¥${Math.round(totalValue).toLocaleString()}</div>
    <div class="summary-row">
      <div class="summary-cell">
        <div class="cell-label">总成本</div>
        <div class="cell-value">¥${Math.round(totalCost).toLocaleString()}</div>
      </div>
      <div class="summary-cell">
        <div class="cell-label">总浮盈</div>
        <div class="cell-value ${color(totalPnlPct)}">${money(totalPnl)}</div>
      </div>
      <div class="summary-cell">
        <div class="cell-label">总收益率</div>
        <div class="cell-value ${color(totalPnlPct)}">${sign(totalPnlPct)}${pct(Math.abs(totalPnlPct))}</div>
      </div>
    </div>
    <div class="market-status">
      <div class="market-dot ${isMarketOpen() ? 'open' : ''}"></div>
      ${isMarketOpen() ? '当前开市中（实时刷新）' : '当前休市'}
    </div>
  `;

  document.getElementById('etfArea').innerHTML = cards.join('');

  document.getElementById('footer').textContent =
    `数据来源：新浪财经 · 仅供参考，不构成投资建议`;
}

// ════════════════════════════════════════════════════════════
// ⏰ 工具函数 & 自动刷新
// ════════════════════════════════════════════════════════════

function isMarketOpen() {
  const now = new Date();
  const day = now.getDay();
  if (day === 0 || day === 6) return false;
  const t = now.getHours() * 100 + now.getMinutes();
  return (t >= 930 && t < 1130) || (t >= 1300 && t < 1500);
}

const pct   = n => (n * 100).toFixed(2) + '%';
const money = n => (n >= 0 ? '+¥' : '-¥') + Math.abs(n).toFixed(0);
const sign  = n => n >= 0 ? '+' : '-';
const color = n => n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';

// 开市期间每 30 秒自动刷新
setInterval(() => { if (isMarketOpen()) loadPrices(); }, 30000);

// 页面加载
loadPrices();
</script>
</body>
</html>
