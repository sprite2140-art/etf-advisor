<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>我的 ETF 顾问</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0d1117;
      --bg-card:  #161b22;
      --border:   #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      /* 国内惯例：红涨绿跌 */
      --up:       #f85149;
      --down:     #3fb950;
      --yellow:   #ffa657;
      --blue:     #58a6ff;
      --lime:     #a3e635;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ─── 头部 ─── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg); z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .refresh-btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer;
    }
    .refresh-btn:active { background: var(--bg); }

    /* ─── 总览卡片 ─── */
    .summary-card {
      margin: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .summary-total { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .summary-row {
      display: flex;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .summary-cell { flex: 1; }
    .summary-cell + .summary-cell { border-left: 1px solid var(--border); padding-left: 16px; }
    .cell-label { font-size: 11px; color: var(--muted); }
    .cell-value { font-size: 16px; font-weight: 700; margin-top: 3px; }
    .market-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; margin-top: 12px; color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .dot.open { background: var(--down); box-shadow: 0 0 6px var(--down); }

    /* ─── 仓位占比 ─── */
    .alloc-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .alloc-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .alloc-bar-wrap { display: flex; height: 6px; border-radius: 6px; overflow: hidden; gap: 2px; }
    .alloc-seg { height: 100%; border-radius: 3px; }
    .alloc-legend { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* ─── 区域标题 ─── */
    .section-title {
      padding: 8px 16px 4px;
      font-size: 11px; color: var(--muted);
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* ─── ETF 卡片 ─── */
    .etf-card {
      margin: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* 顶部信号条 */
    .signal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
    }
    .signal-label { font-size: 19px; font-weight: 800; letter-spacing: 0.5px; }
    .signal-hint  { font-size: 12px; opacity: 0.85; text-align: right; max-width: 55%; line-height: 1.4; }
    .bar-sell       { background: rgba(248,81,73,0.18);  color: var(--up);     }
    .bar-sell-light { background: rgba(255,166,87,0.18); color: var(--yellow); }
    .bar-hold       { background: rgba(63,185,80,0.18);  color: var(--down);   }
    .bar-watch      { background: rgba(88,166,255,0.18); color: var(--blue);   }
    .bar-buy        { background: rgba(163,230,53,0.18); color: var(--lime);   }

    /* 卡片主体 */
    .card-body { padding: 14px 16px 16px; }
    .card-name-row {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-bottom: 10px;
    }
    .etf-name { font-size: 16px; font-weight: 700; }
    .etf-meta { font-size: 11px; color: var(--muted); }

    /* 价格 + 走势图行 */
    .price-spark-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .price-left { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .price-main  { font-size: 26px; font-weight: 800; }
    .price-badge { font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .price-badge.up   { background: rgba(248,81,73,0.12);  color: var(--up);   }
    .price-badge.down { background: rgba(63,185,80,0.12);  color: var(--down); }
    .price-badge.neu  { background: rgba(139,148,158,0.12); color: var(--muted); }
    .price-today-pnl  { font-size: 12px; color: var(--muted); }

    /* 数据网格 */
    .card-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .grid-label { font-size: 10px; color: var(--muted); }
    .grid-value { font-size: 13px; font-weight: 600; margin-top: 2px; }

    /* ─── 观察列表卡片（更简洁） ─── */
    .watch-card {
      margin: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .watch-left .watch-name { font-size: 15px; font-weight: 700; }
    .watch-left .watch-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .watch-right { text-align: right; }
    .watch-price { font-size: 18px; font-weight: 800; }
    .watch-change { font-size: 12px; font-weight: 600; margin-top: 2px; }

    /* ─── 规则卡片 ─── */
    .rules-card {
      margin: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }
    .rules-card h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .rule-row {
      padding: 8px 0; font-size: 13px; color: #c9d1d9;
      line-height: 1.6; border-bottom: 1px solid var(--border);
    }
    .rule-row:last-child { border-bottom: none; padding-bottom: 0; }

    /* ─── 颜色工具 ─── */
    .up   { color: var(--up);   }
    .down { color: var(--down); }
    .neu  { color: var(--muted); }

    /* ─── 底部 ─── */
    .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loading { animation: pulse 1.5s infinite; }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div>
      <h1>我的 ETF 顾问</h1>
      <div class="header-sub" id="updateTime">加载中...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">↻ 刷新</button>
  </div>

  <div id="summaryArea" class="summary-card">
    <div class="summary-label">总资产</div>
    <div class="summary-total loading">计算中...</div>
  </div>

  <div class="section-title">持仓分析</div>
  <div id="holdingCards"></div>

  <div class="section-title">观察列表</div>
  <div id="watchCards"></div>

  <div class="section-title">我的操作规则</div>
  <div class="rules-card">
    <div class="rule-row">🚫 <strong>不追高</strong> — 某只涨幅超过 15%，先别加仓，等等看</div>
    <div class="rule-row">💰 <strong>分批止盈</strong> — 浮盈超 15%，先卖出 10-20%，不贪</div>
    <div class="rule-row">📉 <strong>分批加仓</strong> — 跌回成本价附近，可以小额补仓</div>
    <div class="rule-row">⏸️ <strong>默认不动</strong> — 不确定该怎么做？什么都不做就对了</div>
    <div class="rule-row">🔄 <strong>分批原则</strong> — 买卖都要分批，永远不一次全买全卖</div>
  </div>

  <div class="footer" id="footer">数据来源：新浪财经 · 仅供参考，不构成投资建议</div>

</div>
<script>
// ════════════════════════════════════════════
// 📋 持仓配置（改这里更新你的实际数据）
// ════════════════════════════════════════════
const HOLDINGS = [
  {
    code: 'sz159869', name: '游戏ETF',
    shares: 55000,   costPrice: 1.198,
    type: 'thematic', desc: '游戏行业 · 弹性大波动大',
    stopProfitAt: 0.15, addPositionAt: -0.05,
    color: '#a78bfa',
  },
  {
    code: 'sz161125', name: '标普500LOF',
    shares: 33100,   costPrice: 2.795,
    type: 'config',   desc: '美国大市场 · 相对稳定',
    stopProfitAt: 0.20, addPositionAt: -0.08,
    color: '#60a5fa',
  },
  {
    code: 'sz159583', name: '通信设备ETF',
    shares: 90600,   costPrice: 1.267,
    type: 'aggressive', desc: '中国科技制造 · 进攻型',
    stopProfitAt: 0.15, addPositionAt: -0.05,
    color: '#34d399',
  },
];

// ════════════════════════════════════════════
// 👀 观察列表（感兴趣但还没买的 ETF）
// ════════════════════════════════════════════
const WATCHLIST = [
  { code: 'sh510300', name: '沪深300ETF', desc: '大盘蓝筹 · 最核心的配置' },
  { code: 'sh588000', name: '科创50ETF',  desc: '科创板 · 高风险高收益' },
  { code: 'sh513100', name: '纳指ETF',    desc: '纳斯达克100 · 美国科技' },
];

// ════════════════════════════════════════════
// 🧠 操作建议逻辑
// ════════════════════════════════════════════
function getSignal(pnlPct, etf) {
  const p = pnlPct;
  if (p >= etf.stopProfitAt + 0.05) return {
    label: '分批止盈', css: 'bar-sell',
    hint: `涨了 ${pct(p)}，先卖 15-20%`,
  };
  if (p >= etf.stopProfitAt) return {
    label: '小额止盈', css: 'bar-sell-light',
    hint: `浮盈 ${pct(p)}，可先卖 5-10%`,
  };
  if (p >= 0.03) return {
    label: '继续持有', css: 'bar-hold',
    hint: `浮盈 ${pct(p)}，不用动`,
  };
  if (p >= etf.addPositionAt) return {
    label: '观察', css: 'bar-watch',
    hint: '接近成本价，先等等',
  };
  return {
    label: '可小额加仓', css: 'bar-buy',
    hint: `跌破成本 ${pct(Math.abs(p))}，可补仓`,
  };
}

// ════════════════════════════════════════════
// 📈 迷你走势图（SVG）
// ════════════════════════════════════════════
function sparkline(points, isUp) {
  if (!points || points.length < 2) return '<svg width="80" height="28"></svg>';
  const W = 80, H = 28;
  const min = Math.min(...points), max = Math.max(...points);
  const range = max - min || 0.001;
  const xs = points.map((_, i) => (i / (points.length - 1)) * W);
  const ys = points.map(p => H - 4 - ((p - min) / range) * (H - 8));
  const pts = xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  // 填充区域
  const fillPts = `0,${H} ` + pts + ` ${W},${H}`;
  const stroke = isUp ? 'var(--up)' : 'var(--down)';
  const fill   = isUp ? 'rgba(248,81,73,0.08)' : 'rgba(63,185,80,0.08)';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0">
    <polygon points="${fillPts}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ════════════════════════════════════════════
// 🔄 加载数据
// ════════════════════════════════════════════
const FALLBACK = {
  'sz159869': { current: 1.320, prevClose: 1.344 },
  'sz161125': { current: 2.829, prevClose: 2.833 },
  'sz159583': { current: 1.386, prevClose: 1.357 },
  'sh510300': { current: 4.100, prevClose: 4.090 },
  'sh588000': { current: 1.050, prevClose: 1.040 },
  'sh513100': { current: 2.800, prevClose: 2.820 },
};

let priceHistory = {}; // { code: [price1, price2, ...] }

async function loadAll() {
  render(FALLBACK, {});
  setStatus('获取最新数据...');

  // 同时加载价格和历史
  const [priceData, histData] = await Promise.all([
    fetchJSON('prices.json'),
    fetchJSON('prices-history.json'),
  ]);

  const prices = (priceData?.success && priceData.data) ? priceData.data : FALLBACK;
  priceHistory = histData || {};

  render(prices, priceHistory);
  setStatus('数据更新于 ' + (priceData?.updatedAt || '—'));
}

async function fetchJSON(url) {
  try {
    const res = await fetch(url + '?t=' + Date.now());
    if (res.ok) return await res.json();
  } catch (_) {}
  return null;
}

function setStatus(msg) {
  document.getElementById('updateTime').textContent = msg;
}

// ════════════════════════════════════════════
// 🎨 渲染
// ════════════════════════════════════════════
const ALLOC_COLORS = ['#a78bfa', '#60a5fa', '#34d399'];

function render(prices, history) {
  let totalCost = 0, totalValue = 0;

  // 计算总览数据
  const rows = HOLDINGS.map(etf => {
    const p = prices[etf.code] || FALLBACK[etf.code];
    const cur = p.current, prev = p.prevClose;
    const cost  = etf.shares * etf.costPrice;
    const value = etf.shares * cur;
    totalCost  += cost;
    totalValue += value;
    return { etf, cur, prev, cost, value };
  });

  // ── 总览卡片 ──
  const totalPnl = totalValue - totalCost;
  const totalPct = totalPnl / totalCost;
  const todayTotal = rows.reduce((s, r) => s + r.etf.shares * (r.cur - r.prev), 0);

  const allocBars = rows.map((r, i) =>
    `<div class="alloc-seg" style="flex:${r.value};background:${ALLOC_COLORS[i]};opacity:0.85"></div>`
  ).join('');
  const allocLegend = rows.map((r, i) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${ALLOC_COLORS[i]}"></div>
      ${r.etf.name} ${pct(r.value / totalValue)}
    </div>`
  ).join('');

  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-label">总资产</div>
    <div class="summary-total ${totalPct>=0?'up':'down'}">¥${Math.round(totalValue).toLocaleString()}</div>
    <div class="summary-row">
      <div class="summary-cell">
        <div class="cell-label">总成本</div>
        <div class="cell-value">¥${Math.round(totalCost).toLocaleString()}</div>
      </div>
      <div class="summary-cell">
        <div class="cell-label">总浮盈</div>
        <div class="cell-value ${totalPct>=0?'up':'down'}">${money(totalPnl)}</div>
      </div>
      <div class="summary-cell">
        <div class="cell-label">今日盈亏</div>
        <div class="cell-value ${todayTotal>=0?'up':'down'}">${money(todayTotal)}</div>
      </div>
    </div>
    <div class="market-status">
      <div class="dot ${isOpen()?'open':''}"></div>
      ${isOpen() ? '开市中（自动刷新）' : '休市'}
    </div>
    <div class="alloc-section">
      <div class="alloc-title">仓位占比</div>
      <div class="alloc-bar-wrap">${allocBars}</div>
      <div class="alloc-legend">${allocLegend}</div>
    </div>
  `;

  // ── 持仓卡片 ──
  const holdingHTML = rows.map(({ etf, cur, prev, cost, value }) => {
    const pnl    = value - cost;
    const pnlPct = pnl / cost;
    const todayChg = (cur - prev) / prev;
    const todayPnl = etf.shares * (cur - prev);
    const sig    = getSignal(pnlPct, etf);

    // 历史价格 → 走势图
    const hist   = (history[etf.code] || []).map(h => h.price || h);
    if (hist.length === 0) hist.push(etf.costPrice, cur);
    const spark  = sparkline(hist, todayChg >= 0);

    const chgCls = todayChg > 0 ? 'up' : todayChg < 0 ? 'down' : 'neu';

    return `
      <div class="etf-card">
        <div class="signal-bar ${sig.css}">
          <div class="signal-label">${sig.label}</div>
          <div class="signal-hint">${sig.hint}</div>
        </div>
        <div class="card-body">
          <div class="card-name-row">
            <span class="etf-name">${etf.name}</span>
            <span class="etf-meta">${etf.desc}</span>
          </div>
          <div class="price-spark-row">
            <div class="price-left">
              <span class="price-main"">¥${cur.toFixed(3)}</span>
              <span class="price-badge ${chgCls}">
                ${todayChg>0?'▲':todayChg<0?'▼':'—'} ${pct(Math.abs(todayChg))}
              </span>
              <span class="price-today-pnl ${chgCls}">${money(todayPnl)} 今日</span>
            </div>
            ${spark}
          </div>
          <div class="card-grid">
            <div>
              <div class="grid-label">持有市值</div>
              <div class="grid-value">¥${Math.round(value).toLocaleString()}</div>
            </div>
            <div>
              <div class="grid-label">总浮盈</div>
              <div class="grid-value ${pnlPct>=0?'up':'down'}">${sign(pnlPct)}${pct(Math.abs(pnlPct))}</div>
            </div>
            <div>
              <div class="grid-label">成本 → 现价</div>
              <div class="grid-value">¥${etf.costPrice.toFixed(3)}→${cur.toFixed(3)}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('holdingCards').innerHTML = holdingHTML;

  // ── 观察列表 ──
  const watchHTML = WATCHLIST.map(w => {
    const p = prices[w.code] || FALLBACK[w.code];
    if (!p) return '';
    const chg    = (p.current - p.prevClose) / p.prevClose;
    const chgCls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'neu';
    return `
      <div class="watch-card">
        <div class="watch-left">
          <div class="watch-name">${w.name}</div>
          <div class="watch-desc">${w.desc}</div>
        </div>
        <div class="watch-right">
          <div class="watch-price">¥${p.current.toFixed(3)}</div>
          <div class="watch-change ${chgCls}">
            ${chg>0?'▲':chg<0?'▼':'—'} ${pct(Math.abs(chg))} 今日
          </div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('watchCards').innerHTML = watchHTML;
}

// ════════════════════════════════════════════
// ⏰ 工具函数
// ════════════════════════════════════════════
function isOpen() {
  const now = new Date(), day = now.getDay();
  if (day === 0 || day === 6) return false;
  const t = now.getHours() * 100 + now.getMinutes();
  return (t >= 930 && t < 1130) || (t >= 1300 && t < 1500);
}
const pct   = n => (n * 100).toFixed(2) + '%';
const money = n => (n >= 0 ? '+¥' : '-¥') + Math.abs(n).toFixed(0);
const sign  = n => n >= 0 ? '+' : '-';

// 开市期间每 30 秒刷新
setInterval(() => { if (isOpen()) loadAll(); }, 30000);
loadAll();
</script>
</body>
</html>
