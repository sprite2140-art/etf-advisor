name: 抓取实时ETF价格

on:
  schedule:
    # 交易时间每5分钟（UTC，北京时间=UTC+8）
    - cron: '25,30,35,40,45,50,55 1 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 2 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 3 * * 1-5'
    - cron: '0,5,10,15,20,25,30 4 * * 1-5'
    - cron: '55 4 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5'
    - cron: '0,5 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 抓取价格并更新历史
        run: |
          python3 << 'EOF'
          import urllib.request, json, re
          from datetime import datetime, timezone, timedelta

          # 持仓 + 观察列表 + 大盘指数，全部抓取
          HOLDING_CODES   = ['sz159869', 'sz161125', 'sz159583']
          WATCHLIST_CODES = ['sh510300', 'sh588000', 'sh513100']
          INDEX_CODES     = ['sh000001', 'sz399001', 'sz399006']  # 上证/深成/创业板
          ALL_CODES = HOLDING_CODES + WATCHLIST_CODES + INDEX_CODES

          url = 'https://hq.sinajs.cn/list=' + ','.join(ALL_CODES)
          req = urllib.request.Request(url, headers={
              'Referer': 'https://finance.sina.com.cn',
              'User-Agent': 'Mozilla/5.0'
          })

          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  raw = r.read().decode('gbk', errors='replace')
          except Exception as e:
              print(f'❌ 请求失败: {e}')
              exit(0)

          prices = {}
          for line in raw.split('\n'):
              m = re.search(r'hq_str_(\w+)="([^"]+)"', line)
              if not m or not m.group(2): continue
              code, fields = m.group(1), m.group(2).split(',')
              if len(fields) < 6: continue
              cur, prev = float(fields[3]), float(fields[2])
              if not cur or not prev: continue
              prices[code] = {
                  'name': fields[0], 'current': cur, 'prevClose': prev,
                  'open': float(fields[1]), 'high': float(fields[4]), 'low': float(fields[5]),
              }

          tz  = timezone(timedelta(hours=8))
          now = datetime.now(tz)
          now_str = now.strftime('%Y-%m-%d %H:%M:%S')

          # 写入 prices.json
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump({'success': True, 'data': prices, 'updatedAt': now_str}, f, ensure_ascii=False, indent=2)

          # 更新历史（只记录持仓，保留最近 60 条 ≈ 5 天）
          try:
              with open('prices-history.json', 'r') as f:
                  history = json.load(f)
          except:
              history = {}

          for code in HOLDING_CODES:
              if code not in prices: continue
              if code not in history: history[code] = []
              history[code].append({'time': now_str, 'price': prices[code]['current']})
              history[code] = history[code][-60:]  # 保留最近 60 条

          with open('prices-history.json', 'w', encoding='utf-8') as f:
              json.dump(history, f, ensure_ascii=False, indent=2)

          print(f'✅ {now_str}')
          for code, p in prices.items():
              chg = (p['current'] - p['prevClose']) / p['prevClose'] * 100
              print(f"  {code}: ¥{p['current']}  {chg:+.2f}%")
          EOF

      - name: 检查止盈/加仓提醒
        id: check_alert
        run: |
          python3 << 'EOF'
          import json, os

          HOLDINGS = [
              {'code': 'sz159869', 'name': '游戏ETF',     'shares': 55000,  'costPrice': 1.198, 'stopAt': 0.15, 'addAt': -0.05},
              {'code': 'sz161125', 'name': '标普500LOF',  'shares': 33100,  'costPrice': 2.795, 'stopAt': 0.20, 'addAt': -0.08},
              {'code': 'sz159583', 'name': '通信设备ETF', 'shares': 90600,  'costPrice': 1.267, 'stopAt': 0.15, 'addAt': -0.05},
          ]

          with open('prices.json') as f:
              data = json.load(f)
          prices = data.get('data', {})

          alerts = []
          for h in HOLDINGS:
              p = prices.get(h['code'])
              if not p: continue
              cur      = p['current']
              pnl_pct  = (cur - h['costPrice']) / h['costPrice']
              pnl_yuan = h['shares'] * (cur - h['costPrice'])

              if pnl_pct >= h['stopAt'] + 0.05:
                  alerts.append(f"🔴 {h['name']} 建议分批止盈\n   现价 ¥{cur}  浮盈 {pnl_pct*100:.1f}%  (+¥{pnl_yuan:.0f})\n   涨幅较大，建议先卖出 15-20%")
              elif pnl_pct >= h['stopAt']:
                  alerts.append(f"🟡 {h['name']} 可小额止盈\n   现价 ¥{cur}  浮盈 {pnl_pct*100:.1f}%  (+¥{pnl_yuan:.0f})\n   可考虑先卖出 5-10%")
              elif pnl_pct <= h['addAt'] - 0.03:
                  alerts.append(f"🟢 {h['name']} 可考虑加仓\n   现价 ¥{cur}  浮亏 {pnl_pct*100:.1f}%  (-¥{abs(pnl_yuan):.0f})\n   跌至成本价以下，可小额补仓")

          if alerts:
              msg = '\n\n'.join(alerts)
              msg += f"\n\n查看详情：https://sprite2140-art.github.io/etf-advisor/"
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  # 写入多行环境变量
                  f.write('NEED_ALERT=true\n')
                  f.write('ALERT_MSG<<MSGEOF\n' + msg + '\nMSGEOF\n')
              print('⚠️ 有提醒需要发送')
              print(msg)
          else:
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write('NEED_ALERT=false\n')
              print('✅ 无需提醒')
          EOF

      - name: 发送邮件提醒
        if: env.NEED_ALERT == 'true' && env.MAIL_USERNAME != ''
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:       ${{ secrets.MAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.163.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📊 ETF 操作提醒"
          body: ${{ env.ALERT_MSG }}
          to: ${{ secrets.MAIL_TO }}
          from: ETF 顾问

      - name: 提交更新
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@etf-advisor"
          git add prices.json prices-history.json
          git diff --staged --quiet || git commit -m "📈 更新价格 $(date '+%H:%M')"
          git push
